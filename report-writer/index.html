// 도움말 패널 드래그로 위치 옮기기
// - 제목줄뿐 아니라 패널 어디를 잡아도 끌리게 함 (단, 스크롤되는 본문(#mdHelpBody) 안쪽은
//   손가락/마우스로 내용을 스크롤해야 하므로 예외)
// - 마우스뿐 아니라 터치(탭・폰)도 동일하게 지원
(function(){
  const panel = document.getElementById('mdHelpModal');
  let dragging = false, offsetX = 0, offsetY = 0;

  function shouldStartDrag(target){
    if (target.id === 'mdHelpCloseX') return false; // 닫기(x) 클릭은 드래그로 취급 안 함
    if (target.closest('#mdHelpBody')) return false; // 본문 스크롤 영역은 제외
    return true;
  }

  function startDrag(clientX, clientY){
    dragging = true;
    const rect = panel.getBoundingClientRect();
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
    // 처음 드래그하는 순간, 중앙정렬(left:50%+margin-left)을 실제 좌표값으로 고정 전환
    panel.style.left = rect.left + 'px';
    panel.style.margin = '0';
    document.body.style.userSelect = 'none';
  }

  function moveDrag(clientX, clientY){
    if (!dragging) return;
    const maxLeft = window.innerWidth - panel.offsetWidth;
    const maxTop = window.innerHeight - 40; // 최소한 손잡이 부분은 화면 안에 남도록
    panel.style.left = Math.min(Math.max(0, clientX - offsetX), maxLeft) + 'px';
    panel.style.top = Math.min(Math.max(0, clientY - offsetY), maxTop) + 'px';
  }

  function endDrag(){
    dragging = false;
    document.body.style.userSelect = '';
  }

  // 마우스
  panel.addEventListener('mousedown', (e) => {
    if (!shouldStartDrag(e.target)) return;
    startDrag(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);

  // 터치(탭・폰)
  panel.addEventListener('touchstart', (e) => {
    if (!shouldStartDrag(e.target)) return;
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    moveDrag(t.clientX, t.clientY);
  }, { passive: true });
  document.addEventListener('touchend', endDrag);
})();

// ===== 편집창 서식 빠른삽입 =====
function insertMdSnippet(kind){
  const ta = document.getElementById('mdInput');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const before = ta.value.slice(0, start);
  const selected = ta.value.slice(start, end);
  const after = ta.value.slice(end);
  let insertText = '';

  switch (kind) {
    case 'h2':
      insertText = '\n## ' + (selected || '제목') + '\n';
      break;
    case 'bold':
      insertText = '**' + (selected || '굵은 글씨') + '**';
      break;
    case 'list':
      insertText = '\n' + (selected
        ? selected.split('\n').map(l => '- ' + l).join('\n')
        : '- 항목1\n- 항목2\n- 항목3') + '\n';
      break;
    case 'table':
      insertText = '\n| 항목 | 내용 |\n|---|---|\n| 첫째 | ' + (selected || '') + ' |\n| 둘째 |  |\n';
      break;
    case 'mermaid':
      insertText = '\n```mermaid\nflowchart TD\n    A["시작"] --> B["' + (selected || '끝') + '"]\n```\n';
      break;
    case 'footnote': {
      // 이미 쓰인 [^숫자] 각주 중 가장 큰 번호 다음 번호를 자동으로 부여
      const used = Array.from(ta.value.matchAll(/\[\^(\d+)\]/g)).map(m => parseInt(m[1], 10));
      const nextNum = used.length ? Math.max(...used) + 1 : 1;
      insertText = (selected || '내용') + '[^' + nextNum + ']';
      // 문서 맨 끝에 각주 정의 자리를 함께 추가
      const def = '\n\n[^' + nextNum + ']: ';
      ta.value = before + insertText + after + def;
      const posAfterRef = before.length + insertText.length;
      ta.selectionStart = ta.selectionEnd = posAfterRef;
      ta.focus();
      ta.dispatchEvent(new Event('input', { bubbles: true }));
      flashSaveState('각주 추가됨');
      return; // 아래 공통 처리(끝에 붙이지 않음)를 건너뜀
    }
    case 'hr':
      insertText = '\n\n---\n\n';
      break;
  }

  ta.value = before + insertText + after;
  const newPos = before.length + insertText.length;
  ta.selectionStart = ta.selectionEnd = newPos;
  ta.focus();
  ta.dispatchEvent(new Event('input', { bubbles: true }));
}
document.querySelectorAll('#mdHelpBar button[data-snip]').forEach(btn => {
  btn.addEventListener('click', () => insertMdSnippet(btn.dataset.snip));
});

// ===== 찾기/바꾸기 =====
let findMatches = [];
let findIndex = -1;

function updateFindMatches(){
  const ta = document.getElementById('mdInput');
  const query = document.getElementById('findInput').value;
  findMatches = [];
  findIndex = -1;
  if (query) {
    const lowerText = ta.value.toLowerCase();
    const lowerQuery = query.toLowerCase();
    let pos = 0;
    while (true) {
      const idx = lowerText.indexOf(lowerQuery, pos);
      if (idx === -1) break;
      findMatches.push(idx);
      pos = idx + lowerQuery.length;
    }
  }
  document.getElementById('findStatus').textContent =
    document.getElementById('findInput').value ? (findMatches.length ? '0/' + findMatches.length : '0/0') : '';
}

// textarea는 특정 글자 위치로 스크롤하는 기능이 없어서, 줄 번호를 세어 대략적인 위치로 스크롤
function scrollTextareaToSelection(ta){
  const before = ta.value.slice(0, ta.selectionStart);
  const lineNum = before.split('\n').length - 1;
  const lineHeight = parseFloat(getComputedStyle(ta).lineHeight) || 20;
  ta.scrollTop = Math.max(0, lineNum * lineHeight - ta.clientHeight / 2);
}

function selectFindMatch(){
  const ta = document.getElementById('mdInput');
  const query = document.getElementById('findInput').value;
  const start = findMatches[findIndex];
  ta.focus();
  ta.setSelectionRange(start, start + query.length);
  scrollTextareaToSelection(ta);
  document.getElementById('findStatus').textContent = (findIndex + 1) + '/' + findMatches.length;
}

function goToFindMatch(direction){
  if (!findMatches.length) return;
  findIndex = findIndex === -1 ? 0 : (findIndex + direction + findMatches.length) % findMatches.length;
  selectFindMatch();
}

function replaceCurrentMatch(){
  if (findIndex === -1 || !findMatches.length) return;
  const ta = document.getElementById('mdInput');
  const query = document.getElementById('findInput').value;
  const replacement = document.getElementById('replaceInput').value;
  const start = findMatches[findIndex];
  ta.value = ta.value.slice(0, start) + replacement + ta.value.slice(start + query.length);
  ta.dispatchEvent(new Event('input', { bubbles: true }));
  updateFindMatches();
  if (findMatches.length) {
    findIndex = Math.min(findIndex, findMatches.length - 1);
    selectFindMatch();
  }
}

function replaceAllMatches(){
  const ta = document.getElementById('mdInput');
  const query = document.getElementById('findInput').value;
  const replacement = document.getElementById('replaceInput').value;
  if (!query) return;
  const count = findMatches.length;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  ta.value = ta.value.replace(new RegExp(escaped, 'gi'), replacement);
  ta.dispatchEvent(new Event('input', { bubbles: true }));
  updateFindMatches();
  flashSaveState(count + '건 변경됨');
}

function openFindBar(){
  document.getElementById('findReplaceBar').style.display = 'flex';
  const fi = document.getElementById('findInput');
  fi.focus();
  fi.select();
  updateFindMatches();
}
function closeFindBar(){
  document.getElementById('findReplaceBar').style.display = 'none';
  findMatches = [];
  findIndex = -1;
}
document.getElementById('btnFindOpen').addEventListener('click', () => {
  const bar = document.getElementById('findReplaceBar');
  if (bar.style.display === 'flex') closeFindBar();
  else openFindBar();
});
document.getElementById('findInput').addEventListener('input', updateFindMatches);
document.getElementById('findNext').addEventListener('click', () => goToFindMatch(1));
document.getElementById('findPrev').addEventListener('click', () => goToFindMatch(-1));
document.getElementById('replaceOne').addEventListener('click', replaceCurrentMatch);
document.getElementById('replaceAllBtn').addEventListener('click', replaceAllMatches);
document.getElementById('findInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); goToFindMatch(e.shiftKey ? -1 : 1); }
  else if (e.key === 'Escape') { e.preventDefault(); closeFindBar(); }
});

// ===== 편집창 단축키(Ctrl/Cmd+B 굵게, Ctrl/Cmd+F 찾기) + 목록 Enter 자동이어쓰기 =====
document.getElementById('mdInput').addEventListener('keydown', (e) => {
  const cmd = e.ctrlKey || e.metaKey;
  if (cmd && e.key.toLowerCase() === 'b') {
    e.preventDefault();
    insertMdSnippet('bold');
    return;
  }
  if (cmd && e.key.toLowerCase() === 'f') {
    e.preventDefault();
    openFindBar();
    return;
  }
  if (e.key === 'Enter') {
    const ta = e.target;
    const start = ta.selectionStart;
    const value = ta.value;
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    const currentLine = value.slice(lineStart, start);
    const bulletMatch = currentLine.match(/^(\s*)([-*+])\s+(.*)$/);
    const numberMatch = currentLine.match(/^(\s*)(\d+)([.)])\s+(.*)$/);

    if (bulletMatch) {
      e.preventDefault();
      if (bulletMatch[3].trim() === '') {
        // 빈 목록 항목에서 엔터 → 목록 종료(마커 제거)
        ta.value = value.slice(0, lineStart) + value.slice(start);
        ta.selectionStart = ta.selectionEnd = lineStart;
      } else {
        const insertion = '\n' + bulletMatch[1] + bulletMatch[2] + ' ';
        ta.value = value.slice(0, start) + insertion + value.slice(start);
        ta.selectionStart = ta.selectionEnd = start + insertion.length;
      }
      ta.dispatchEvent(new Event('input', { bubbles: true }));
    } else if (numberMatch) {
      e.preventDefault();
      if (numberMatch[4].trim() === '') {
        ta.value = value.slice(0, lineStart) + value.slice(start);
        ta.selectionStart = ta.selectionEnd = lineStart;
      } else {
        const nextNum = parseInt(numberMatch[2], 10) + 1;
        const insertion = '\n' + numberMatch[1] + nextNum + numberMatch[3] + ' ';
        ta.value = value.slice(0, start) + insertion + value.slice(start);
        ta.selectionStart = ta.selectionEnd = start + insertion.length;
      }
      ta.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }
});

async function render(){
  const out = document.getElementById('renderOut');
  const empty = document.getElementById('emptyState');
  const d = getSelected();
  if (!d) {
    out.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  out.style.display = '';
  empty.style.display = 'none';
  const src = document.getElementById('mdInput').value;
  const format = d.format || 'md'; // 이전 버전에 저장된 문서는 format이 없으므로 md로 간주
  const isExternal = d.theme === 'external' && format !== 'html';
  let html;
  try {
    if (format === 'html') {
      // html 형식은 마크다운 파서 대신, 안전을 위해 매번 sanitize를 한 번 더 거쳐 원본 스타일/스크립트를 제거
      html = safeSanitizeHtml(src) ?? src;
    } else if (isExternal) {
      // 용역보고서(외부) 테마: rpt.netax.kr(index.html)과 완전히 동일한 전처리·렌더링 파이프라인 사용
      const processedMd = preprocessBold(preprocessFootnotes(src));
      html = marked.parse(processedMd);
      html = html.replace(/<table>/g, '<div class="table-scroll"><table>').replace(/<\/table>/g, '</table></div>');
    } else {
      html = marked.parse(preprocess(src), { breaks:false, gfm:true });
    }
  } catch (err) {
    console.error('[렌더링 오류]', err);
    html = '<p style="color:#a33;">렌더링 중 오류가 발생했습니다: ' + escapeHtml(err && err.message ? err.message : String(err)) + '</p>';
  }
  out.className = currentTheme().cls;
  out.innerHTML = html;

  if (isExternal) {
    // rpt.netax.kr의 showResult()와 동일한 순서로 후처리 (mermaid는 비동기라 완료를 기다린 뒤 나머지 실행)
    try {
      await renderMermaidBlocks(out);
      renderCompareBars(out);
      renderChartBlocks(out);
      renderTimelineBlocks(out);
      renderPrismBlocks(out);
      renderKatex(out);
      applyCalloutColors(out);
      buildTableOfContents(out);
      linkifyStatutes(out);
      markScrollableTables(out);
      // 폰트 로딩 등으로 초기 측정이 부정확할 수 있어 잠시 후 한 번 더 갱신
      requestAnimationFrame(() => markScrollableTables(out));
      setTimeout(() => markScrollableTables(out), 300);
    } catch (err) {
      console.error('[외부보고서 렌더링 후처리 오류]', err);
    }
  }
}

// ---------- 편집창 ↔ 미리보기 스크롤 동기화 (비율 기준 대략적 위치 맞추기) ----------
// 편집창 원문 줄 수와 미리보기 렌더링 결과의 실제 높이는 서로 다른 척도라 정확히 맞출 수는 없으므로,
// "전체 스크롤 가능 범위 중 몇 %쯤 왔는가"를 기준으로 대략 맞춘다. 한쪽 스크롤이 다른 쪽을 다시
// 스크롤시키고, 그게 또 첫 번째를 스크롤시키는 무한루프를 막기 위해 syncingScroll 플래그를 사용.
let scrollSyncEnabled = true;
let syncingScroll = false;

function syncScrollFrom(sourceEl, targetEl){
  if (!scrollSyncEnabled || syncingScroll) return;
  const ws = document.getElementById('workspace');
  if (ws.classList.contains('editor-only') || ws.classList.contains('preview-only')) return; // 전용모드일 땐 의미없음

  const sourceMax = sourceEl.scrollHeight - sourceEl.clientHeight;
  const targetMax = targetEl.scrollHeight - targetEl.clientHeight;
  if (sourceMax <= 0 || targetMax <= 0) return;

  syncingScroll = true;
  const ratio = sourceEl.scrollTop / sourceMax;
  targetEl.scrollTop = ratio * targetMax;
  requestAnimationFrame(() => { syncingScroll = false; });
}

document.getElementById('mdInput').addEventListener('scroll', () => {
  syncScrollFrom(document.getElementById('mdInput'), document.getElementById('previewPane'));
});
document.getElementById('previewPane').addEventListener('scroll', () => {
  syncScrollFrom(document.getElementById('previewPane'), document.getElementById('mdInput'));
});

function setLayoutMode(mode){
  const ws = document.getElementById('workspace');
  ws.classList.remove('editor-only', 'preview-only');
  if (mode === 'editor') ws.classList.add('editor-only');
  else if (mode === 'preview') ws.classList.add('preview-only');
  // mode === 'both'이면 아무 클래스도 없는 기본 상태(좌우 분할)

  // 드래그로 걸어둔 인라인 폭(style.flex)은 CSS 규칙(flex:1 1 100%)보다 항상 우선하므로,
  // 전용모드에서는 지워야 편집창/미리보기가 제대로 꽉 채워짐 (안 지우면 마지막 드래그 폭에 멈춰있음)
  if (mode !== 'both') {
    document.getElementById('editorPane').style.flex = '';
  }

  document.getElementById('layoutEditor').classList.toggle('active', mode === 'editor');
  document.getElementById('layoutBoth').classList.toggle('active', mode === 'both');
  document.getElementById('layoutPreview').classList.toggle('active', mode === 'preview');
}
document.getElementById('layoutEditor').addEventListener('click', () => setLayoutMode('editor'));
document.getElementById('layoutBoth').addEventListener('click', () => {
  const ws = document.getElementById('workspace');
  const alreadyBoth = !ws.classList.contains('editor-only') && !ws.classList.contains('preview-only');
  if (alreadyBoth) {
    // 이미 "둘 다 보기"인 상태에서 다시 누르면 스크롤 동기화 켜기/끄기 토글
    scrollSyncEnabled = !scrollSyncEnabled;
    document.getElementById('layoutBoth').classList.toggle('sync-off', !scrollSyncEnabled);
    document.getElementById('layoutBoth').title = scrollSyncEnabled
      ? '모아보기 (스크롤 동기화 켜짐)'
      : '모아보기 (스크롤 동기화 꺼짐)';
    flashSaveState(scrollSyncEnabled ? '스크롤 동기화 켜짐' : '스크롤 동기화 꺼짐');
  } else {
    setLayoutMode('both');
  }
});

// ---------- 편집창/미리보기 좌우 폭 드래그로 조절 (끝까지 밀면 전용모드로 자동전환) ----------
(function(){
  const divider = document.getElementById('paneDivider');
  const editor = document.getElementById('editorPane');
  const workspace = document.getElementById('workspace');
  let dragging = false;
  const MIN_EDITOR = 220;  // 편집창 최소폭 — 이보다 좁아지려 하면 바로 미리보기 전용으로 전환
  const MIN_PREVIEW = 260; // 미리보기 최소폭 — 이보다 좁아지려 하면 바로 편집창 전용으로 전환

  divider.addEventListener('mousedown', () => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = workspace.getBoundingClientRect();
    const newWidth = e.clientX - rect.left;

    // "더 이상 못 줄어드는 최소폭"과 "자동전환 지점"을 같은 값으로 맞춰서,
    // 끌다가 멈칫하는 죽은 구간 없이 곧바로 이어지게 함
    if (newWidth < MIN_EDITOR) {
      dragging = false;
      divider.classList.remove('dragging');
      document.body.style.userSelect = '';
      setLayoutMode('preview');
      return;
    }
    if (newWidth > rect.width - MIN_PREVIEW) {
      dragging = false;
      divider.classList.remove('dragging');
      document.body.style.userSelect = '';
      setLayoutMode('editor');
      return;
    }
    editor.style.flex = '0 0 ' + newWidth + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.userSelect = '';
  });
})();


// ---------- 전체화면 (appRoot 전체를 전체화면으로 만들고, CSS 클래스로 편집창/미리보기 중 하나만 노출)
// previewPane이나 editorPane 자체만 전체화면으로 만들면, 그 바깥에 있는 도움말·조문팝업 모달이
// 전체화면 위로 올라오지 못하는 Fullscreen API의 특성 때문에 모달이 뒤에 가려지는 문제가 있었음(2026.07 발견).
// appRoot(툴바+작업공간+모달 전체를 포함하는 최상위 래퍼)를 전체화면 대상으로 삼아 이 문제를 근본적으로 해결.
function toggleFullscreen(mode){
  const root = document.getElementById('appRoot');
  if (!document.fullscreenElement) {
    root.classList.add(mode === 'editor' ? 'fs-editor' : 'fs-preview');
    (root.requestFullscreen || root.webkitRequestFullscreen)?.call(root);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
  }
}
document.addEventListener('fullscreenchange', () => {
  const inFs = !!document.fullscreenElement;
  if (!inFs) document.getElementById('appRoot').classList.remove('fs-editor', 'fs-preview');
  document.getElementById('btnFullscreen').title = inFs ? '전체화면 나가기' : '전체화면으로 보기';
  document.getElementById('btnFullscreenEditor').title = inFs ? '전체화면 나가기' : '편집창 전체화면으로 보기';

// - 새창으로 보기, HTML 다운로드에서 공용으로 사용
function buildStandaloneHtml(){
  const d = getSelected();

  const liveRoot = document.getElementById('renderOut');

  // Chart.js는 <canvas>에 픽셀을 그릴 뿐, 그 결과물은 DOM/outerHTML에 포함되지 않는다.
  // cloneNode(true)로 캔버스를 복제해도 내용은 항상 빈 캔버스가 되므로(2026.07 확인된 버그),
  // 완성본을 "그대로 표시만 하면 되는" 정적 문서로 만들려면 캔버스를 지금 그려진 화면 그대로
  // <img>로 구워서(toDataURL) 대체해야 한다. 원본 캔버스 순서대로 매칭한다.
  const liveCanvases = liveRoot.querySelectorAll('canvas');
  const clone = liveRoot.cloneNode(true);
  clone.style.zoom = ''; // 화면에서 확대/축소한 배율이 내보낸 파일에 섞여 들어가지 않도록 제거
  clone.removeAttribute('id'); // #renderOut 전용 폭제한 해제 규칙이 내보낸 파일에는 적용되지 않도록(실제 인쇄/고객화면 폭 유지)
  const cloneCanvases = clone.querySelectorAll('canvas');
  liveCanvases.forEach((liveCanvas, i) => {
    const cloneCanvas = cloneCanvases[i];
    if (!cloneCanvas) return;
    try {
      const img = document.createElement('img');
      img.src = liveCanvas.toDataURL('image/png');
      img.style.cssText = cloneCanvas.style.cssText || '';
      img.style.maxWidth = '100%';
      cloneCanvas.replaceWith(img);
    } catch (err) {
      // toDataURL 실패(예: 캔버스가 아직 그려지기 전) 시에도 다운로드 자체는 막지 않고 넘어감

  // 위 clone에 포함되지 않는다. 완성본이 report-writer 없이 단독으로도 동작하도록
  // 모달 마크업과 필요한 데이터·함수를 함께 구워 넣는다.
  const statuteModalHtml = document.getElementById('statuteModal').outerHTML;
  const statuteScript = '<script>\n'
    + 'const STATUTE_INFO = ' + JSON.stringify(STATUTE_INFO) + ';\n'
    + 'const STATUTE_LAW_FULLNAME = ' + JSON.stringify(STATUTE_LAW_FULLNAME) + ';\n'
    + buildArticlePath.toString() + '\n'
    + 'function showStatutePopup(key){\n'
    + '  const info = STATUTE_INFO[key];\n'
    + '  if (!info) return;\n'
    + '  document.getElementById("statuteModalTitle").textContent = info.title;\n'
    + '  document.getElementById("statuteModalBody").textContent = info.summary;\n'
    + '  const lawShort = key.split(" ")[0];\n'
    + '  const lawFullName = STATUTE_LAW_FULLNAME[lawShort] || lawShort;\n'
    + '  const articlePath = buildArticlePath(key);\n'
    + '  const linkEl = document.getElementById("statuteModalLink");\n'
    + '  linkEl.href = articlePath\n'
    + '    ? "https://www.law.go.kr/법령/" + encodeURIComponent(lawFullName) + "/" + encodeURIComponent(articlePath)\n'
    + '    : "https://www.law.go.kr/LSW/lsSc.do?section=&menuId=1&subMenuId=15&tabMenuId=81&query=" + encodeURIComponent(lawFullName);\n'
    + '  document.getElementById("statuteModal").style.display = "flex";\n'
    + '}\n'
    + 'function closeStatuteModal(){ document.getElementById("statuteModal").style.display = "none"; }\n'
    + 'document.querySelectorAll(".statute-link").forEach(function(span){\n'
    + '  const key = span.dataset.statuteKey;\n'
    + '  if (key) span.addEventListener("click", function(){ showStatutePopup(key); });\n'
    + '});\n'
    + 'document.addEventListener("keydown", function(e){ if (e.key === "Escape") closeStatuteModal(); });\n'
    + '</' + 'script>';
  // 완성본은 marked/mermaid/KaTeX/Chart.js/Prism 등 어떤 렌더링 스크립트도 없이 열리므로,
  // 이미 렌더링된 결과가 그대로 보이는 데 필요한 CSS(KaTeX 수식 레이아웃, Prism 코드 하이라이팅 색상)만
  // 함께 담아 보낸다(둘 다 이전에는 head에 빠져 있어 완성본에서 수식·코드블록이 깨지는 버그가 있었음).

    + '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">\n'
    + '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">';
  return '<!DOCTYPE html>\n<html lang="ko">\n<head>\n<meta charset="UTF-8">\n'
    + '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'

function downloadAsDoc(){
  if (!getSelected()) return;
  const theme = currentTheme();
  const clone = document.getElementById('renderOut').cloneNode(true);
  clone.style.zoom = ''; // 화면에서 확대/축소한 배율이 내보낸 파일에 섞여 들어가지 않도록 제거
  clone.removeAttribute('id');

  // 이미지: 옛날 파서가 이해하는 legacy 속성(align, width)을 직접 부여
  clone.querySelectorAll('img').forEach(img => {
    img.setAttribute('align', 'right');
    img.setAttribute('width', '620');
    img.removeAttribute('style');
    img.style.cssText = 'display:block; margin:0 0 4mm auto; border:none;';
  });

  // 그림/표 캡션: 클래스 대신 인라인 style로 좌측정렬・볼드 강제
  clone.querySelectorAll('p.caption').forEach(p => {
    p.removeAttribute('class');
    p.style.cssText = 'text-align:left; font-weight:bold; font-size:12pt; margin:5mm 0 1mm 0;';
  });

  // 단위 표기(단위: 원 등)
  clone.querySelectorAll('p.unit-note').forEach(p => {
    p.removeAttribute('class');
    p.style.cssText = 'text-align:right; font-size:10pt; margin:0;';
  });

  // 페이지분리 표시는 문서 파일에서는 불필요하므로 실제 페이지나눔(워드 컨트롤 문자)으로 치환
  clone.querySelectorAll('div.doc-pagebreak').forEach(div => {
    div.outerHTML = '<br clear="all" style="page-break-before:always" />';
  });

  // 표: border 속성을 직접 부여하고 각 셀에도 인라인 테두리 지정
  clone.querySelectorAll('table').forEach(table => {
    table.setAttribute('border', '1');
    table.setAttribute('cellspacing', '0');
    table.setAttribute('cellpadding', '4');
    table.style.cssText = 'border-collapse:collapse; width:100%;';
    table.querySelectorAll('th,td').forEach(cell => {
      const bold = cell.tagName === 'TH' ? 'font-weight:bold; background:#efefef;' : '';
      cell.style.cssText = 'border:1pt solid #000; padding:3px 5px;' + bold + (cell.style.textAlign ? ('text-align:'+cell.style.textAlign+';') : '');
    });
  });

  const bodyHtml = clone.outerHTML;
  const docHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" '
    + 'xmlns:w="urn:schemas-microsoft-com:office:word" '
    + 'xmlns="http://www.w3.org/TR/REC-html40">'
    + '<head><meta charset="utf-8">'
    + '<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View>'
    + '<w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->'
    + '<style>'
    + '@page WordSection1{size:210mm 297mm; margin:25mm 20mm 22mm 20mm;}'
    + 'div.WordSection1{page:WordSection1;}'
    + 'body{font-family:"Batang","Noto Serif KR",serif; font-size:11.5pt; line-height:1.6;}'
    + 'h1{font-size:22pt; text-align:center;} h2{font-size:15pt; text-align:center; font-weight:bold;}'
    + 'h3{font-size:12.5pt; font-weight:bold;}'
    + '</style>'
    + '</head><body><div class="WordSection1">' + bodyHtml + '</div></body></html>';
  const blob = new Blob(['\ufeff', docHtml], {type:'application/msword;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = theme.filename.replace(/\.md$/, '.doc');
  a.click();
  URL.revokeObjectURL(url);
}

// 툴바가 화면 폭에 따라 한 줄/두 줄로 바뀌므로, 미리보기 플로팅 컨트롤(확대축소・전체화면)이
// 툴바 실제 높이 바로 아래 오도록 고정값 대신 매번 다시 계산 (안 그러면 툴바가 두 줄이 될 때
// 컨트롤이 두 번째 줄 버튼과 겹쳐서 그 버튼에 마우스가 안 닿는 문제가 있었음, 2026.07)
function updatePreviewControlsPosition(){
  const pc = document.getElementById('previewControls');
  if (window.matchMedia('(max-width: 820px)').matches) {
    pc.style.top = ''; // 모바일에서는 CSS(우측 하단 고정)에 맡김
    return;
  }
  const toolbarHeight = document.getElementById('toolbar').offsetHeight;
  pc.style.top = (toolbarHeight + 12) + 'px';
}
window.addEventListener('resize', updatePreviewControlsPosition);
document.addEventListener('fullscreenchange', updatePreviewControlsPosition);
updatePreviewControlsPosition();

loadFromUrlFileId().finally(render);
</script>
